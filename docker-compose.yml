services:
  beam:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - beam-data:/data
    environment:
      PORT: "3000"
      DATABASE_URL: "/data/beam.db"
      BLOB_STORAGE_DIR: "/data/blobs"
      LOG_LEVEL: "info"
      # Per-upload size caps (bytes). Defaults: 25 MiB blob, 1 MiB envelope.
      # MAX_BLOB_BYTES: "26214400"
      # MAX_ENVELOPE_BYTES: "1048576"
    restart: unless-stopped

volumes:
  beam-data:
