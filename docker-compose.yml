services:
  beam:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - beam-data:/data
    environment:
      PORT: "3000"
      DATABASE_URL: "/data/beam.db"
      BLOB_STORAGE_DIR: "/data/blobs"
      LOG_LEVEL: "info"
    healthcheck:
      # node-based probe — no need to bake curl/wget into the image.
      test:
        - CMD
        - node
        - -e
        - "require('node:http').get('http://127.0.0.1:3000/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  beam-data:
